; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:ATmega32]
platform = atmelavr
board = ATmega32

; Zamiast framework = avr-libc, po prostu go usuń lub zakomentuj
; PlatformIO domyślnie użyje avr-gcc, jeśli nie podasz frameworka
board_build.f_cpu = 8000000L ; Tu wpisz taktowanie swojego kwarcu (np. 16MHz)

; To jest kluczowe dla czystego C:
build_flags = 
    -Os


; Konfiguracja programatora USBasp:
upload_protocol = usbasp
; Poniższa linia ignoruje sprawdzanie portu COM, bo USBasp działa bezpośrednio na USB
upload_flags =
    -Pusb
    -e
    -B 32